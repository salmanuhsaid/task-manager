<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow - Task Manager</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- NAVIGATION -->
  <nav class="navbar">
    <div class="logo">✅ TaskFlow</div>
    <ul class="nav-links">
      <li><a href="index.html" class="active">Home</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>
    </ul>
  </nav>

  <!-- HERO SECTION -->
  <header class="hero">
    <h1>Manage Your Tasks Smarter</h1>
    <p>Stay organized, meet your deadlines, and get things done.</p>
  </header>

   <!-- MAIN APP -->
  <main class="container">

    <!-- ADD TASK FORM -->
    <section class="add-task-section">
      <h2>Add New Task</h2>
      <div class="task-form">
        <input type="text" id="taskInput" placeholder="Enter task title..." />
        <input type="date" id="taskDate" />
        <select id="taskPriority">
          <option value="low">🟢 Low Priority</option>
          <option value="medium" selected>🟡 Medium Priority</option>
          <option value="high">🔴 High Priority</option>
        </select>
        <button onclick="addTask()">Add Task</button>
      </div>
    </section>

    <!-- FILTER BUTTONS -->
    <section class="filter-section">
      <button onclick="filterTasks('all')" class="filter-btn active-filter">All</button>
      <button onclick="filterTasks('active')" class="filter-btn">Active</button>
      <button onclick="filterTasks('completed')" class="filter-btn">Completed</button>
    </section>

    <!-- TASK LIST -->
    <section class="task-list-section">
      <h2>Your Tasks <span id="taskCount">(0)</span></h2>
      <ul id="taskList"></ul>
    </section>

  </main>

   <!-- FOOTER -->
  <footer class="footer">
    <p>© 2026 TaskFlow. Built with HTML, CSS & JavaScript.</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
